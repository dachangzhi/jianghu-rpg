<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江湖夜雨 — 文字RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #0a0a0f;
  color: #d4c5a0;
  font-family: 'Noto Serif SC', serif;
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
}
#game-container {
  max-width: 800px;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  padding: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#game-screen {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  width: 100%;
}
@media (max-width: 768px) {
  body { align-items: stretch; }
  #game-container { max-width: 100%; padding: 4px; height: 100vh; height: 100dvh; }
  h1 { font-size: 1.4em; margin: 8px 0; }
  .subtitle { font-size: 0.8em; margin-bottom: 10px; }
  #story-panel { padding: 8px; font-size: 0.88em; line-height: 1.65; margin-bottom: 4px; }
  .choice-btn { padding: 10px 10px; font-size: 0.88em; }
  #status-bar { flex-direction: row; flex-wrap: wrap; padding: 6px 8px; gap: 4px 10px; font-size: 0.78em; margin-bottom: 4px; }
  .stat { flex: 0 0 auto; }
  .hp-bar { width: 50px; }
  #save-load { top: 4px; right: 4px; }
  .sl-btn { padding: 3px 6px; font-size: 0.7em; }
  #title-screen { padding-top: 20vh; }
  #title-screen .lore { font-size: 0.82em; padding: 0 8px; }
  .start-btn { padding: 10px 24px; font-size: 0.95em; margin-top: 16px; }
  .chapter-marker { font-size: 0.9em; }
  .npc-rel { display: inline-block; margin-right: 8px; }
  #npc-panel { margin-bottom: 4px; padding: 6px; font-size: 0.82em; }
  #inventory-panel { margin-bottom: 4px; padding: 6px; font-size: 0.82em; }
  #ending-screen { padding: 16px; }
  #ending-screen h2 { font-size: 1.3em; }
  .ending-text { font-size: 0.85em; }
}
h1 {
  text-align: center;
  font-size: 2.2em;
  color: #c9a050;
  margin: 20px 0;
  text-shadow: 0 0 20px rgba(201,160,80,0.3);
}
.subtitle {
  text-align: center;
  color: #8a7a5a;
  margin-bottom: 30px;
  font-size: 0.95em;
}
#story-panel {
  flex: 1;
  min-height: 0;
  background: rgba(20,18,15,0.8);
  border: 1px solid #2a2520;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
  line-height: 1.9;
  font-size: 1.05em;
  overflow-y: auto;
  white-space: pre-wrap;
}
#story-panel::-webkit-scrollbar { width: 6px; }
#story-panel::-webkit-scrollbar-track { background: transparent; }
#story-panel::-webkit-scrollbar-thumb { background: #3a3530; border-radius: 3px; }
.narrator { color: #a09070; font-style: italic; }
.npc-name { font-weight: bold; }
.npc-dialog { color: #d4c5a0; padding-left: 12px; border-left: 2px solid #4a4030; margin: 8px 0; }
.highlight { color: #c9a050; }
.danger { color: #c05050; }
.success { color: #50a050; }
#status-bar {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  padding: 12px;
  background: rgba(20,18,15,0.6);
  border: 1px solid #2a2520;
  border-radius: 8px;
  font-size: 0.9em;
}
.stat {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-label { color: #8a7a5a; }
.stat-value { color: #c9a050; font-weight: bold; }
.hp-bar { width: 80px; height: 8px; background: #2a2520; border-radius: 4px; overflow: hidden; display: inline-block; }
.hp-fill { height: 100%; background: linear-gradient(90deg, #c05050, #50a050); border-radius: 4px; transition: width 0.5s; }
#choices-panel {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 35vh;
  overflow-y: auto;
  flex-shrink: 0;
}
.choice-btn {
  background: rgba(40,35,25,0.8);
  border: 1px solid #3a3520;
  color: #d4c5a0;
  padding: 14px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  font-size: 1em;
  text-align: left;
  transition: all 0.2s;
}
.choice-btn:hover {
  background: rgba(60,50,30,0.9);
  border-color: #c9a050;
  color: #c9a050;
}
.choice-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
#npc-panel {
  display: none;
  margin-bottom: 12px;
  padding: 12px;
  background: rgba(20,18,15,0.6);
  border: 1px solid #2a2520;
  border-radius: 8px;
}
#npc-panel h3 { color: #c9a050; margin-bottom: 8px; font-size: 1em; }
.npc-rel { display: inline-block; margin-right: 16px; font-size: 0.9em; }
.npc-rel .name { color: #d4c5a0; }
.npc-rel .rel-val { font-weight: bold; }
.rel-positive { color: #50a050; }
.rel-negative { color: #c05050; }
.rel-neutral { color: #8a7a5a; }
#inventory-panel {
  display: none;
  margin-bottom: 12px;
  padding: 12px;
  background: rgba(20,18,15,0.6);
  border: 1px solid #2a2520;
  border-radius: 8px;
  font-size: 0.9em;
}
#inventory-panel h3 { color: #c9a050; margin-bottom: 8px; font-size: 1em; }
.inv-item { display: inline-block; margin: 2px 8px 2px 0; padding: 2px 8px; background: rgba(60,50,30,0.5); border-radius: 4px; }
#title-screen { text-align: center; padding-top: 60px; }
#title-screen .lore { color: #8a7a5a; line-height: 2; max-width: 500px; margin: 20px auto; font-size: 0.95em; }
.start-btn {
  background: linear-gradient(135deg, #3a3020, #2a2515);
  border: 2px solid #c9a050;
  color: #c9a050;
  padding: 16px 48px;
  font-size: 1.2em;
  font-family: 'Noto Serif SC', serif;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 30px;
  transition: all 0.3s;
}
.start-btn:hover {
  background: linear-gradient(135deg, #5a4a30, #3a3020);
  box-shadow: 0 0 20px rgba(201,160,80,0.3);
}
#ending-screen { display: none; text-align: center; padding-top: 40px; }
#ending-screen h2 { color: #c9a050; font-size: 1.8em; margin-bottom: 20px; }
#ending-screen .ending-text { line-height: 2; max-width: 600px; margin: 0 auto 30px; }
.ending-type { color: #8a7a5a; font-size: 0.9em; margin-bottom: 20px; }
.restart-btn {
  background: rgba(40,35,25,0.8);
  border: 1px solid #c9a050;
  color: #c9a050;
  padding: 12px 36px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1em;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover { background: rgba(60,50,30,0.9); }
.chapter-marker { color: #c9a050; text-align: center; font-size: 1.1em; margin: 16px 0 8px; letter-spacing: 4px; }
.divider { text-align: center; color: #3a3520; margin: 12px 0; letter-spacing: 8px; }
#save-load {
  position: relative; display: flex; gap: 6px; margin-bottom: 4px; flex-shrink: 0;
}
.sl-btn {
  background: rgba(30,28,22,0.9);
  border: 1px solid #3a3520;
  color: #8a7a5a;
  padding: 6px 12px;
  font-size: 0.8em;
  font-family: 'Noto Serif SC', serif;
  border-radius: 4px;
  cursor: pointer;
}
.sl-btn:hover { border-color: #c9a050; color: #c9a050; }
</style>
</head>
<body>

<div id="save-load">
  <button class="sl-btn" onclick="saveGame()">💾 存档</button>
  <button class="sl-btn" onclick="loadGame()">📂 读档</button>
</div>

<div id="game-container">
  <div id="title-screen">
    <h1>江 湖 夜 雨</h1>
    <div class="subtitle">一剑一江湖，一夜一宿命</div>
    <div class="lore">
      大燕永安三年，天下初定。

      苍龙镇，一个依山而建的小镇，
      平静得像一潭死水。
      但最近来了不少外乡人——
      有佩剑的，有带刀的，有算计的。

      没人告诉你为什么，
      但你能感觉到——
      这水底下，有什么东西在涌动。

      你是一个无名剑客，
      雨夜投宿于「听雨客栈」。
      这一夜，将改变你的命运。
    </div>
    <button class="start-btn" onclick="startGame()">踏 入 江 湖</button>
  </div>

  <div id="game-screen">
    <div id="status-bar"></div>
    <div id="npc-panel"></div>
    <div id="inventory-panel"></div>
    <div id="story-panel"></div>
    <div id="choices-panel"></div>
  </div>

  <div id="ending-screen">
    <h2 id="ending-title"></h2>
    <div class="ending-type" id="ending-type"></div>
    <div class="ending-text" id="ending-text"></div>
    <button class="restart-btn" onclick="location.reload()">再入江湖（重新开始）</button>
  </div>
</div>

<script>
// ==================== GAME ENGINE ====================
const G = {
  chapter: 0,
  scene: '',
  hp: 100,
  maxHp: 100,
  sword: 10,
  wits: 10,
  charm: 10,
  inventory: [],
  flags: {},
  relationships: {},
  choices_made: [],
  playthrough: 0,
};

const NPCS = {
  shen_guyan: {
    name: '沈孤雁',
    title: '客栈老板',
    personality: '表面温和，实则深不可测。前朝遗臣，隐姓埋名经营客栈，暗中保护天机卷。说话滴水不漏，善于观察人心。',
    defaultRel: 0,
  },
  liu_ruyin: {
    name: '柳如烟',
    title: '神秘女剑客',
    personality: '冷傲孤高，言辞犀利。实为朝廷暗卫，奉命追查天机卷。外表冷漠，内心有柔软之处。信奉"弱者不配持剑"。',
    defaultRel: -5,
  },
  zhao_tieniu: {
    name: '赵铁牛',
    title: '铁匠',
    personality: '豪爽直率，力大无穷。看似粗犷，实则忠诚可靠，重情重义。曾为军中百夫长，厌倦杀戮归隐。最恨背信弃义之人。',
    defaultRel: 5,
  },
  hu_qingniang: {
    name: '胡青娘',
    title: '药铺掌柜',
    personality: '八面玲珑，心细如发。表面是和善的药师，实则是江湖情报贩子。凡事讲究等价交换，绝不做亏本买卖。',
    defaultRel: 0,
  },
  bai_yunsheng: {
    name: '白云生',
    title: '落魄书生',
    personality: '才华横溢却自命不凡，科举失意后流落江湖。醉后吐真言，清醒时装疯。知晓许多秘密，但只对信任的人开口。',
    defaultRel: 0,
  },
  hei_wuji: {
    name: '黑无极',
    title: '蒙面杀手',
    personality: '冷酷无情，职业杀手。但有自己的底线——不杀妇孺。言出必行，追杀目标从不失手。与沈孤雁有旧怨。',
    defaultRel: -20,
  },
};

function getRel(npcId) {
  return G.relationships[npcId] ?? NPCS[npcId].defaultRel;
}
function changeRel(npcId, delta) {
  G.relationships[npcId] = (G.relationships[npcId] ?? NPCS[npcId].defaultRel) + delta;
}
function hasItem(item) { return G.inventory.includes(item); }
function addItem(item) { if (!G.inventory.includes(item)) G.inventory.push(item); }
function removeItem(item) { G.inventory = G.inventory.filter(i => i !== item); }
function setFlag(f) { G.flags[f] = true; }
function hasFlag(f) { return !!G.flags[f]; }
function addHp(v) { G.hp = Math.min(G.maxHp, Math.max(0, G.hp + v)); }

// ==================== UI ====================
function renderStatus() {
  const bar = document.getElementById('status-bar');
  const hpPct = (G.hp / G.maxHp * 100);
  bar.innerHTML = `
    <div class="stat"><span class="stat-label">❤️ 生命</span><div class="hp-bar"><div class="hp-fill" style="width:${hpPct}%"></div></div><span class="stat-value">${G.hp}</span></div>
    <div class="stat"><span class="stat-label">⚔️ 剑术</span><span class="stat-value">${G.sword}</span></div>
    <div class="stat"><span class="stat-label">🧠 心机</span><span class="stat-value">${G.wits}</span></div>
    <div class="stat"><span class="stat-label">✨ 魅力</span><span class="stat-value">${G.charm}</span></div>
    <div class="stat"><span class="stat-label">📖 章节</span><span class="stat-value">${G.chapter}</span></div>
  `;
}
function renderNPCs() {
  const panel = document.getElementById('npc-panel');
  const known = Object.keys(G.relationships);
  if (known.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  let html = '<h3>👥 人物关系</h3>';
  for (const id of known) {
    const npc = NPCS[id];
    const rel = getRel(id);
    const cls = rel > 10 ? 'rel-positive' : rel < -10 ? 'rel-negative' : 'rel-neutral';
    html += `<span class="npc-rel"><span class="name">${npc.name}</span> <span class="rel-val ${cls}">${rel > 0 ? '+' : ''}${rel}</span></span>`;
  }
  panel.innerHTML = html;
}
function renderInventory() {
  const panel = document.getElementById('inventory-panel');
  if (G.inventory.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  let html = '<h3>🎒 物品</h3>';
  for (const item of G.inventory) {
    html += `<span class="inv-item">${item}</span>`;
  }
  panel.innerHTML = html;
}
function renderAll() {
  renderStatus();
  renderNPCs();
  renderInventory();
}

function typeText(el, html, cb) {
  el.innerHTML = html;
  const panel = document.getElementById('story-panel');
  panel.scrollTop = panel.scrollHeight;
  if (cb) cb();
}

function showChoices(choices) {
  const panel = document.getElementById('choices-panel');
  panel.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    if (c.disabled) { btn.disabled = true; btn.textContent += ' (条件不足)'; }
    btn.onclick = () => {
      G.choices_made.push(c.id || c.text);
      if (c.effects) c.effects();
      renderAll();
      if (c.next) c.next();
    };
    panel.appendChild(btn);
  });
}

function clearStory() { document.getElementById('story-panel').innerHTML = ''; }

function narrate(text) {
  const panel = document.getElementById('story-panel');
  panel.innerHTML += `<span class="narrator">${text}</span>\n`;
  panel.scrollTop = panel.scrollHeight;
}

function chapterTitle(title) {
  const panel = document.getElementById('story-panel');
  panel.innerHTML += `<div class="chapter-marker">—— ${title} ——</div>`;
  panel.scrollTop = panel.scrollHeight;
}

function divider() {
  const panel = document.getElementById('story-panel');
  panel.innerHTML += `<div class="divider">· · · · ·</div>`;
  panel.scrollTop = panel.scrollHeight;
}

function dialog(npcId, text) {
  const npc = NPCS[npcId];
  const panel = document.getElementById('story-panel');
  panel.innerHTML += `<div class="npc-dialog"><span class="npc-name" style="color:${getRel(npcId)>10?'#50a050':getRel(npcId)<-10?'#c05050':'#c9a050'}">【${npc.name}】</span>「${text}」</div>\n`;
  panel.scrollTop = panel.scrollHeight;
}

function highlight(text) { return `<span class="highlight">${text}</span>`; }
function danger(text) { return `<span class="danger">${text}</span>`; }
function success(text) { return `<span class="success">${text}</span>`; }

// ==================== SAVE / LOAD ====================
function saveGame() {
  localStorage.setItem('jhyy_save', JSON.stringify(G));
  alert('存档成功！');
}
function loadGame() {
  const s = localStorage.getItem('jhyy_save');
  if (!s) { alert('没有存档。'); return; }
  Object.assign(G, JSON.parse(s));
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('ending-screen').style.display = 'none';
  renderAll();
  if (SCENES[G.scene]) SCENES[G.scene]();
  else { clearStory(); narrate('存档损坏，请重新开始。'); }
}

// ==================== SCENES ====================
const SCENES = {};

// ---- CHAPTER 1: 听雨客栈 ----
SCENES['start'] = () => {
  G.chapter = 1;
  G.scene = 'start';
  clearStory();
  chapterTitle('第一章 · 听雨客栈');
  narrate(`大雨倾盆，你策马来到苍龙镇。\n镇口只有一家客栈亮着灯——「听雨客栈」。\n你推门而入，温暖的烛光和饭菜香气扑面而来。`);
  divider();
  narrate(`客栈大堂里坐着几个人：\n柜台后站着一位${highlight('中年男子')}，笑容和蔼；\n角落里一位${highlight('黑衣女子')}独自饮酒，佩剑放在手边；\n壁炉旁一个${highlight('壮汉')}正在擦拭铁锤，看起来是镇上的铁匠。\n窗边还有一个${highlight('书生模样的人')}趴在桌上，似乎已经醉了。`);
  
  showChoices([
    { text: '走向柜台，向老板要一间房', id: 'c1_talk_shen', next: SCENES['talk_shen'] },
    { text: '注意到黑衣女子的剑——那是一把上好宝剑，搭话', id: 'c1_talk_liu', next: SCENES['talk_liu'] },
    { text: '坐到壁炉旁，和铁匠攀谈', id: 'c1_talk_zhao', next: SCENES['talk_zhao'] },
    { text: '先观察一会儿，不动声色', id: 'c1_observe', effects: () => { G.wits += 1; }, next: SCENES['observe'] },
  ]);
};

SCENES['talk_shen'] = () => {
  G.scene = 'talk_shen';
  if (!G.relationships.shen_guyan) { G.relationships.shen_guyan = 5; } else { changeRel('shen_guyan', 3); }
  narrate(`\n你走到柜台前。中年男子微微一笑。`);
  dialog('shen_guyan', '客官辛苦了。这大雨天赶路，想必是从远处来？我叫沈孤雁，这间客栈是我开的。上好的女儿红，要不要来一壶暖暖身子？');
  showChoices([
    { text: '「多谢老板，来一壶。我叫……不重要，江湖人。」', id: 'c1_shen_friendly', effects: () => { changeRel('shen_guyan', 3); G.charm += 1; }, next: SCENES['shen_friendly'] },
    { text: '「不必了。这镇子最近可有什么异事？」', id: 'c1_shen_probing', effects: () => { G.wits += 1; }, next: SCENES['shen_probing'] },
    { text: '注意他手上的老茧——那是常年握刀留下的', id: 'c1_shen_observeskill', effects: () => { setFlag('noticed_shen_skill'); G.wits += 2; }, next: SCENES['shen_observeskill'] },
  ]);
};

SCENES['shen_friendly'] = () => {
  G.scene = 'shen_friendly';
  narrate(`\n沈孤雁为你倒了一杯温热的酒。`);
  dialog('shen_guyan', '哈哈，爽快人！我最喜欢爽快人。江湖人多故事多，这客栈里啊，什么人都有。你尽管住着，只要不惹事，一切都好说。');
  narrate(`他压低声音，眼神闪了一下。`);
  dialog('shen_guyan', '不过……客官若是无事，天黑之后最好待在房里。这苍龙镇的夜，不太平。');
  divider();
  narrate(`他递给你一把铜钥匙。`);
  dialog('shen_guyan', '天字三号房，上楼左转。有需要随时叫我。');
  addItem('客栈钥匙');
  setFlag('shen_friendly');
  showChoices([
    { text: '继续在客栈里转转', id: 'c1_after_shen1', next: SCENES['lobby_free'] },
  ]);
};

SCENES['shen_probing'] = () => {
  G.scene = 'shen_probing';
  narrate(`\n沈孤雁的笑容微微一滞，随即恢复如常。`);
  dialog('shen_guyan', '异事？这小镇能有什么异事。不过是前两天来了几个外乡人，都在打听什么山上的东西。我一个开客栈的，哪里知道那么多。');
  narrate(`他顿了顿，目光在你的剑上停留了一瞬。`);
  dialog('shen_guyan', '客官也是来找东西的？');
  showChoices([

SCENES['night_wait'] = () => {
  G.scene = 'night_wait';
  narrate(`\n你贴着门板，屏住呼吸。\n\n门外传来低语：\n「……天机卷的线索在药铺那个女人手里……黑无极大人说了，拿不到线索，就杀光……」\n\n脚步声渐渐远去。`);
  divider();
  narrate(`你悄悄打开一条门缝——走廊尽头，一个蒙面人正在撬胡青娘的房门。\n楼下传来打斗声。`);
  setFlag('overheard_assassins');
  showChoices([
    { text: '跟踪蒙面人', id: 'c2_follow', next: SCENES['follow_assassin'] },
    { text: '从窗户翻到后院', id: 'c2_wait_window', next: SCENES['night_window'] },
  ]);
};

SCENES['fight_assassin'] = () => {
  G.scene = 'fight_assassin';
  narrate(`\n你的剑快如闪电——${success('一剑刺中蒙面人的手腕！')}\n短刀落地，胡青娘趁机挣脱。\n蒙面人退后几步，冷声道：`);
  dialog('hei_wuji', '……好剑法。你是谁？');
  narrate(`他似乎在评估你的实力。`);
  setFlag('saved_hu_combat');
  changeRel('hei_wuji', 5);
  G.sword += 2;
  G.relationships.hu_qingniang = 15;
  addItem('蒙面短刀');
  showChoices([
    { text: '「你又是谁？为什么袭击这个女人？」', id: 'c2_confront_hei', next: SCENES['confront_hei'] },
    { text: '继续攻击，不容他喘息', id: 'c2_attack_hei', next: SCENES['attack_hei'] },
  ]);
};

SCENES['negotiate_assassin'] = () => {
  G.scene = 'negotiate_assassin';
  narrate(`\n蒙面人冷笑。`);
  dialog('hei_wuji', '我要什么，与你无关。识相的话，回房去。这条命……我不一定非要取。');
  narrate(`胡青娘趁机低声对你说：`);
  dialog('hu_qingniang', '他叫黑无极……是江湖上有名的杀手。他要逼我说出……不行，我不能说。');
  setFlag('met_hei_wuji');
  showChoices([
    { text: '「黑无极，放了她，我给你你想要的信息。」', id: 'c2_deal_hei', effects: () => { G.charm += 1; }, next: SCENES['deal_hei'] },
    { text: '趁他分神，突袭！', id: 'c2_sneak_attack', effects: () => { G.sword += 1; addHp(-20); }, next: SCENES['sneak_attack'] },
  ]);
};

SCENES['help_zhao'] = () => {
  G.scene = 'help_zhao';
  narrate(`\n你冲向赵铁牛！他正以一敌二，但身上已多了几道伤口。\n你的加入让他精神一振。`);
  dialog('zhao_tieniu', '兄弟！来了！左边那个交给你！');
  narrate(`${success('你们合力击退了两个黑衣人！')}\n赵铁牛的铁锤果然不是普通铁锤——锤头脱落后，露出里面一把${highlight('精钢短刀')}。`);
  changeRel('zhao_tieniu', 10);
  setFlag('fought_with_zhao');
  G.sword += 1;
  showChoices([
    { text: '「赵大哥，你到底什么来头？」', id: 'c2_zhao_truth', next: SCENES['zhao_truth'] },
    { text: '「先去药铺救胡青娘！」', id: 'c2_zhao_to_hu', next: SCENES['help_hu'] },
  ]);
};

SCENES['zhao_truth'] = () => {
  G.scene = 'zhao_truth';
  narrate(`\n赵铁牛看了看手中的短刀，长叹一声。`);
  dialog('zhao_tieniu', '……瞒不住了。我以前不只是一个百夫长。我是……前朝禁卫军的人。天机卷，我知道它在哪里。');
  narrate(`他压低声音，眼神沉重。`);
  dialog('zhao_tieniu', `你知道为什么所有人都想找到天机卷吗？上面记着${highlight('一千七百个名字')}。每个人都在某个地方用假名活着——开铺子的、种地的、教书的。他们以为自己安全了。`);
  divider();
  narrate(`${danger('他的拳头握紧了。')}`);
  dialog('zhao_tieniu', '三年前，朝廷从一条漏出的线索里抓到了十七个人。其中有一个……是我兄弟。他带着老婆孩子逃了三年，最终还是被找到。一家三口，满门抄斩。');
  narrate(`他深吸一口气。`);
  dialog('zhao_tieniu', '如果天机卷完整地落入朝廷手里——一千七百家，就是一千七百个满门抄斩。');
  narrate(`他看着你的眼睛，神色复杂。`);
  dialog('zhao_tieniu', '落雁峰的后山，有一个山洞。入口被巨石封住了，需要特定的机关才能打开。而机关的钥匙……分成三份，分别在沈老板、胡青娘、和那个书生手里。');
  setFlag('zhao_knows_location');
  setFlag('knows_three_keys');
  showChoices([
    { text: '「你为什么告诉我？」', id: 'c2_zhao_why', next: SCENES['zhao_why'] },
    { text: '「那我们现在就去找他们。」', id: 'c2_zhao_go', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['zhao_why'] = () => {
  G.scene = 'zhao_why';
  narrate(`\n赵铁牛擦了擦脸上的血。`);
  dialog('zhao_tieniu', '因为……今晚之后，不管天机卷落在谁手里，这镇上都留不住了。黑无极不会善罢甘休。朝廷的人——那个柳如烟——也不会。\n\n我不想让天机卷落在坏人手里。你……是我在这镇上信得过的人。');
  changeRel('zhao_tieniu', 5);
  showChoices([
    { text: '继续行动', id: 'c2_zhao_continue', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['help_hu'] = () => {
  G.scene = 'help_hu';
  if (!G.relationships.hu_qingniang) G.relationships.hu_qingniang = 0;
  narrate(`\n你冲进药铺。三个黑衣人正在逼问胡青娘。\n她被按在柜台上，嘴角有血，但眼神倔强。`);
  dialog('hu_qingniang', '……要杀便杀。想从我嘴里套话？做梦。');
  narrate(`黑衣人看到你，两人转身迎战。`);
  showChoices([
    { text: '正面对决！（剑术检定）', id: 'c2_fight_hu', disabled: G.sword < 11, effects: () => { G.sword += 1; addHp(-15); }, next: SCENES['hu_rescued'] },
    { text: '利用药铺的环境——踢翻药柜制造混乱', id: 'c2_trick_hu', effects: () => { G.wits += 1; }, next: SCENES['hu_rescued'] },
  ]);
};

SCENES['hu_rescued'] = () => {
  G.scene = 'hu_rescued';
  narrate(`
${success('黑衣人被你击退！')}
胡青娘靠着柜台，喘息着看着你。她的左臂被划了一刀，血滴在地上。`);
  dialog('hu_qingniang', '……你救了我。行，江湖规矩，我欠你一条命。我叫胡青娘，这药铺是我开的，但我真正做的是——情报买卖。');
  changeRel('hu_qingniang', 15);
  setFlag('saved_hu');
  narrate(`她从柜台暗格里取出一块${highlight('玉牌')}，手微微发抖。`);
  dialog('hu_qingniang', '刚才那些人是来逼问天机卷下落的。他们已经杀了三个人了——镇东的李裁缝、河边打渔的老孙头，还有客栈帮厨的小莲。');
  narrate(`她停顿了一下，声音变得嘶哑。`);
  dialog('hu_qingniang', '李裁缝真实身份是前朝翰林院编修，老孙头以前是御前侍卫，小莲……她才十九岁，是前朝郡主的侍女。他们以为自己藏得够深了。');
  divider();
  narrate(`${danger('三条人命。就在今天。就在这个小镇。')}`);
  narrate(`胡青娘把玉牌递给你。`);
  dialog('hu_qingniang', '这是天机卷入口的钥匙之一。另外两块在沈老板和白云生手里。如果你能把它们凑齐……我就告诉你山洞在哪里。');
  addItem('玉牌·药');
  setFlag('hu_key');
  showChoices([
    { text: '「为什么要我凑齐？你自己不行吗？」', id: 'c2_hu_why', next: SCENES['hu_why'] },
    { text: '继续行动', id: 'c2_hu_continue', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['hu_why'] = () => {
  G.scene = 'hu_why';
  narrate(`\n胡青娘苦笑。`);
  dialog('hu_qingniang', '因为沈老板不信任我，白云生……他更不信任任何人。但你不一样。你今晚救了我的命，在他们眼里，你至少不是敌人。');
  narrate(`她走到柜台后面，掀开一块暗板——下面是一叠文书。`);
  dialog('hu_qingniang', '我做了十年情报买卖。这十年里，我帮三十七个前朝遗臣改了身份，藏到新的地方。每个人的新名字、新住处，都在我的脑子里。');
  divider();
  narrate(`她看着你的眼睛，表情无比认真。`);
  dialog('hu_qingniang', '天机卷上有一千七百个名字。每一个名字背后都是一个家庭，三到五口人。你算算——这份卷轴握着近万人的生死。');
  narrate(`${danger('近万人的生死。')}`);
  dialog('hu_qingniang', '如果落入朝廷手里——大燕皇帝会连夜发兵，按图索骥，一个不留。这不是假设，十年前他们在北方已经这么干过一次。一夜之间，四百余家，血流成河。');
  setFlag('knows_tianji_truth');
  showChoices([
    { text: '继续行动', id: 'c2_hu_continue2', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['find_liu'] = () => {
  G.scene = 'find_liu';
  narrate(`\n你在混乱中寻找柳如烟。她在客栈屋顶上，冷冷地俯瞰着下方的战斗。\n月光下，她的身影如一尊冰雕。`);
  dialog('liu_ruyin', '你倒是沉得住气。其他人都像没头苍蝇一样乱跑，只有你——你往屋顶上看。');
  narrate(`她跳了下来，落在你面前。`);
  dialog('liu_ruyin', '黑无极是朝廷通缉的杀手。他也在找天机卷。如果他先找到……你不会想知道后果。');
  showChoices([
    { text: '「你呢？你不也在找天机卷？」', id: 'c2_liu_truth', next: SCENES['liu_truth'] },
    { text: '「和你合作，有什么好处？」', id: 'c2_liu_deal', next: SCENES['liu_deal'] },
  ]);
};

SCENES['liu_truth'] = () => {
  G.scene = 'liu_truth';
  narrate(`\n柳如烟沉默了片刻。`);
  dialog('liu_ruyin', '……我是锦衣卫的人。没错。我奉命来取天机卷。但你以为我想来吗？\n\n那个名单上……有我父亲的名字。');
  narrate(`她的声音第一次有了波动。`);
  dialog('liu_ruyin', '如果我完不成任务，朝廷会派别人来。那个人……不会手软。但如果你帮我拿到天机卷，我可以——\n我可以毁掉它。然后告诉朝廷，天机卷已经不存在了。');
  setFlag('liu_father_on_list');
  changeRel('liu_ruyin', 10);
  showChoices([
    { text: '「好，我信你。」', id: 'c2_liu_trust', effects: () => { setFlag('liu_alliance'); changeRel('liu_ruyin', 5); }, next: SCENES['chapter2_hub'] },
    { text: '「我需要想想。」', id: 'c2_liu_think', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['liu_deal'] = () => {
  G.scene = 'liu_deal';
  narrate(`\n柳如烟嘴角微扬。`);
  dialog('liu_ruyin', '直接谈利益，我喜欢。好——如果你帮我拿到天机卷，我可以保证：第一，朝廷不会追究你的任何麻烦。第二，我给你五百两白银。第三……我可以告诉你，谁在你的酒里下了药。');
  narrate(`你心头一惊——${danger('下药？')}\n回想今晚的疲惫感……确实不太正常。`);
  setFlag('knows_poisoned');
  showChoices([
    { text: '「谁下的药？」', id: 'c2_liu_who_poison', next: SCENES['liu_who_poison'] },
    { text: '先不追究，继续行动', id: 'c2_liu_continue', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['liu_who_poison'] = () => {
  G.scene = 'liu_who_poison';
  narrate(`\n柳如烟看着客栈的方向。`);
  dialog('liu_ruyin', '沈孤雁。他在每个人的酒里都加了一点「迷魂散」。不多，只是让人反应变慢。他想让所有人都昏昏欲睡，这样……今晚发生什么事，没人能及时反应。');
  narrate(`她冷笑。`);

    { text: '继续行动', id: 'c2_liu_continue2', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['confront_hei'] = () => {
  G.scene = 'confront_hei';
  narrate(`\n黑无极摘下面罩，露出一张满是伤疤的脸。`);
  dialog('hei_wuji', '我是黑无极。受人之托来找天机卷。我不杀无辜——但挡我路的人，不算无辜。');
  narrate(`他看了看你的剑，若有所思。`);
  dialog('hei_wuji', '你的剑法不错。考虑一下——天机卷的委托人出的价很高。如果你帮我，我能分你一半。三千两黄金。');
  showChoices([
    { text: '「我不为钱卖命。」', id: 'c2_hei_refuse', effects: () => { changeRel('hei_wuji', -5); }, next: SCENES['hei_refuse'] },
    { text: '「……三千两？说来听听。」', id: 'c2_hei_listen', effects: () => { setFlag('heard_hei_deal'); changeRel('hei_wuji', 5); }, next: SCENES['hei_listen'] },
  ]);
};

SCENES['attack_hei'] = () => {
  G.scene = 'attack_hei';
  narrate(`\n你趁他说话时出手！\n${success('剑光一闪，划破他的袖子！')}\n但黑无极反应极快，一个翻身退出三丈。\n他看着袖口的裂痕，冷笑。`);
  dialog('hei_wuji', '偷袭？呵……果然是江湖人。不过——下一次，我不会给你第二次出手的机会。');
  narrate(`他消失在黑暗中。`);
  setFlag('attacked_hei');
  showChoices([
    { text: '继续行动', id: 'c2_hei_after', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['deal_hei'] = () => {
  G.scene = 'deal_hei';
  narrate(`\n黑无极审视着你。短刀仍然抵着胡青娘的脖子。`);
  dialog('hei_wuji', '信息？什么信息？');
  narrate(`你快速思考。你确实还没拿到什么实质线索——但你必须争取时间。`);
  narrate(`你盯着他的眼睛，尽量让自己看起来胸有成竹。`);
  divider();
  narrate(`黑无极看了你三秒。然后——出乎你意料地——他松开了胡青娘。`);
  dialog('hei_wuji', '你的眼神不像在撒谎。但你手上也没有东西。我给你一个机会。');
  narrate(`他将短刀收回袖中，声音冰冷。`);
  dialog('hei_wuji', '天机卷的入口需要三块玉牌才能打开。分别在一个药铺女人、一个书生、和这个客栈老板手里。你如果能拿到任何一块——拿来找我。到时候，我们可以谈。');
  narrate(`他顿了顿，补充道：`);
  dialog('hei_wuji', '至于今晚……我的人不会动这个客栈。但你只有到天亮。天亮之后我找不到你——这个镇上的人，一个不留。');
  narrate(`他转身消失在走廊尽头，身影如墨融入黑暗。`);
  narrate(`${danger('天亮之前。')}`);
  setFlag('hei_open_to_deal');
  setFlag('knows_three_keys');
  G.relationships.hu_qingniang = G.relationships.hu_qingniang ?? 0;
  showChoices([
    { text: '继续行动', id: 'c2_deal_after', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['sneak_attack'] = () => {
  G.scene = 'sneak_attack';
  narrate(`\n你突然出手！黑无极闪避不及，被你划伤了肩膀。\n但他反手一掌拍在你胸口——${danger('你被震退，撞在墙上！-20HP')}`);

  dialog('hei_wuji', '……有两下子。我们还会再见的。');

    { text: '继续行动', id: 'c2_sneak_after', next: SCENES['chapter2_hub'] },
  ]);
};

SCENES['follow_assassin'] = () => {
  G.scene = 'follow_assassin';
  narrate(`\n你悄悄跟上蒙面人。他走到后院，和另外两人在低声交谈。\n\n「钥匙分成了三块，分别在药铺女人、老板、和那个书生手里。」\n「黑无极大人说，天亮之前必须拿到。否则朝廷的人会先动手。」`);

  ]);

SCENES['bai_night'] = () => {
  G.scene = 'bai_night';
  narrate(`\n白云生点点头。`);
  dialog('bai_yunsheng', '三块钥匙。我手里有一块。另外两块在沈老板和胡青娘那里。我不会轻易交出我的那一块——除非你告诉我，你想用天机卷做什么。');

    { text: '「还没想好。」', id: 'c2_bai_honest', effects: () => { changeRel('bai_yunsheng', 3); }, next: SCENES['bai_hesitate'] },
  ]);
};

SCENES['bai_give_key'] = () => {

「……三块玉牌……山洞……沈老板……药铺……书生……」`);

  if (!hasItem('玉牌·沈') && !hasFlag('shen_key')) {

  }
  
  // Alliance options

    choices.push({ text: '和柳如烟结盟', id: 'c2_hub_liu', next: SCENES['ally_liu'] });

  divider();

  narrate(`\n${highlight('沈孤雁')}站在左侧，手握弯刀，看着卷轴。\n${highlight('柳如烟')}站在右侧，剑尖微垂，眼神复杂。\n${danger('黑无极')}挡在门口，手按刀柄，虎视眈眈。\n${highlight('白云生')}靠在墙上，安静地观察。\n${highlight('赵铁牛')}握着铁锤，站在你身旁。`);
  divider();
  narrate(`所有人都在等你的决定。`);
  
  showChoices([
    { text: '拿起天机卷，当众销毁', id: 'ending_destroy', next: SCENES['ending_destroy'] },
    { text: '拿起天机卷，交给沈孤雁', id: 'ending_shen', next: SCENES['ending_shen'] },
    { text: '拿起天机卷，交给柳如烟', id: 'ending_liu', next: SCENES['ending_liu'] },
    { text: '拿起天机卷，交给黑无极', id: 'ending_hei', next: SCENES['ending_hei'] },
    { text: '拿起天机卷，据为己有', id: 'ending_self', next: SCENES['ending_self'] },

  ]);
};

// ==================== ENDINGS ====================

  narrate(`你拿起天机卷，撕成两半。\n\n${danger('「住手！」')}黑无极暴怒，拔刀冲向你！\n但赵铁牛挡在你面前，铁锤横扫。\n沈孤雁也动了——他截住了黑无极的手下。\n\n混战中，你将卷轴一页页撕碎，投入石台上的铜炉。火焰吞噬了泛黄的纸张。`);
  divider();
  if (hasFlag('liu_alliance')) {
    dialog('liu_ruyin', '……很好。回去我会告诉朝廷——天机卷在混战中损毁。谁都别想找到了。');
  }
  dialog('shen_guyan', '……你做了最正确的选择。这些名字……不该成为任何人的武器。');
  if (hasFlag('hei_alliance')) {
    narrate(`\n黑无极看着化为灰烬的卷轴，沉默良久。`);
    dialog('hei_wuji', '……暗星阁的人……会继续隐藏下去。也许这样也好。');
  } else {
    narrate(`\n黑无极怒极反笑。`);
    dialog('hei_wuji', '你会为此付出代价的。暗星阁不会放过你。');

  divider();
  narrate(`\n你走出山洞。天边泛起了鱼肚白。\n雨停了，苍龙镇在晨曦中苏醒。\n\n没有天机卷，没有遗宝，没有可以操控天下的力量。\n但三百多个人的名字，将永远安全。\n\n你翻身上马，向远方驶去。\n身后，是新的一天。`);
  showEnding('烈火焚卷', 'ending_destroy', '天机已焚，江湖依旧。你选择了让秘密随风消散。');
};

SCENES['ending_self'] = () => {
  G.scene = 'ending';

SCENES['ending_mirror'] = () => {

  narrate(`你猛然抬头，看向在场的每一个人。\n\n沈孤雁——十五年守护，不为名利，只为故人。\n柳如烟——锦衣卫的身份下，藏着对父亲的爱。\n赵铁牛——一身蛮力下，包裹着最质朴的忠诚。\n白云生——装疯卖傻，只为活下去说真话。\n胡青娘——精于算计，却为亡夫的刀流泪。\n黑无极——冷血杀手，却有不杀妇孺的底线。`);
  divider();
  narrate(`天机卷上写了什么名字，已经不重要了。\n重要的是——在场的每个人，都已经做出了选择。\n\n${highlight('每个人都是别人的秘密，每个人都在守护着什么。')}\n\n你转身走向洞口，没有拿走卷轴。`);
  divider();
  narrate(`身后，沈孤雁第一个动了。他将卷轴收入怀中，对着所有人说：`);

  narrate(`没有人反对。\n\n黑无极默默转身离去。\n柳如烟看了你一眼——那目光中有敬佩，也有释然。\n赵铁牛拍了拍你的肩膀，什么也没说。\n白云生对你举了举空酒杯。`);
  divider();
  narrate(`你走出山洞。\n\n日出东方，苍龙镇沐浴在金色的阳光中。\n\n这江湖上，有些秘密注定永远不被揭开。\n而那些活在秘密之下的人——\n他们值得一个安宁的清晨。\n\n你翻身上马，朝着朝阳的方向驶去。\n\n${highlight('江湖路远，后会有期。')}`);
  showEnding('天机在心', 'ending_mirror', '真正的天机，不在卷轴上，而在人心之中。');
};

function showEnding(title, id, desc) {
  G.scene = 'ending_' + id;
  divider();
  
  // Show ending stats
  narrate(`\n—— 结局统计 ——`);
  narrate(`通关章节：${G.chapter}\n剑术：${G.sword} | 心机：${G.wits} | 魅力：${G.charm}\n做出选择：${G.choices_made.length} 次`);
  
  const relLines = [];
  for (const [k, v] of Object.entries(G.relationships)) {
    relLines.push(`${NPCS[k].name}：${v > 0 ? '+' : ''}${v}`);
  }
  if (relLines.length) narrate(`人际关系：${relLines.join(' | ')}`);
  
  setTimeout(() => {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('ending-screen').style.display = 'block';
    document.getElementById('ending-title').textContent = `结局：${title}`;
    document.getElementById('ending-type').textContent = desc;
    document.getElementById('ending-text').innerHTML = `<p style="margin-top:10px;color:#c9a050;">感谢游玩「江湖夜雨」！</p><p style="margin-top:8px;color:#8a7a5a;">本游戏共有 6 个不同结局。尝试不同的选择，发现更多故事吧。</p>`;
  }, 2000);
}

// ==================== START ====================
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  
  // Reset state
  G.chapter = 0;
  G.hp = 100;
  G.maxHp = 100;
  G.sword = 10;
  G.wits = 10;
  G.charm = 10;
  G.inventory = [];
  G.flags = {};
  G.relationships = {};
  G.choices_made = [];
  G.scene = 'start';
  
  renderAll();
  SCENES['start']();
}
